<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Monitor</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-card: #fff;
            --text: #111;
            --text-secondary: #555;
            --text-muted: #888;
            --text-meta: #666;
            --border: #ccc;
            --drop-bg: #f0f0f0;
            --drop-border: #999;
            --drop-hover-bg: #e0e8f0;
            --drop-hover-border: #0078d4;
            --input-bg: #fff;
            --timeline-bar-bg: #e8e8e8;
            --timeline-info-bg: #f9f9f9;
            --detection-bg: #e8f5e9;
            --shadow: rgba(0,0,0,0.1);
            --filter-bg: #fff;
            --filter-hover: #e0e8f0;
            --lightbox-bg: rgba(0,0,0,0.85);
        }
        [data-theme="dark"] {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --text: #e0e0e0;
            --text-secondary: #aaa;
            --text-muted: #777;
            --text-meta: #999;
            --border: #333;
            --drop-bg: #1a1a2e;
            --drop-border: #555;
            --drop-hover-bg: #1a2a4a;
            --drop-hover-border: #4aa3df;
            --input-bg: #0f3460;
            --timeline-bar-bg: #2a2a4a;
            --timeline-info-bg: #1a2a4a;
            --detection-bg: #1a3a2a;
            --shadow: rgba(0,0,0,0.4);
            --filter-bg: #16213e;
            --filter-hover: #1a2a4a;
            --lightbox-bg: rgba(0,0,0,0.92);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
        h1 { margin-bottom: 20px; }
        h2 { margin: 20px 0 10px; }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 18px;
            z-index: 999;
            box-shadow: 0 2px 6px var(--shadow);
            transition: background 0.3s, border-color 0.3s;
        }
        .theme-toggle:hover { opacity: 0.8; }

        .upload-form {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 3px var(--shadow);
            margin-bottom: 20px;
        }
        .upload-form label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text); }
        .upload-form input[type="file"] { display: none; }
        .file-label {
            display: block;
            background: var(--drop-bg);
            border: 2px dashed var(--drop-border);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            transition: background 0.2s, border-color 0.2s;
        }
        .file-label:hover { background: var(--drop-hover-bg); border-color: var(--drop-hover-border); }
        .file-label.has-file { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .upload-form button {
            background: #0078d4;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .upload-form button:hover { background: #006abc; }
        .status { margin-top: 10px; font-size: 14px; }
        .status.ok { color: green; }
        .status.err { color: red; }

        .detection-result {
            margin-top: 10px;
            padding: 10px;
            background: var(--detection-bg);
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }
        .detection-result.active { display: block; }
        .spot-open { color: green; font-weight: 600; }
        .spot-occupied { color: #888; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        .gallery img {
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .gallery img:hover { transform: scale(1.03); }
        .gallery-item { position: relative; }
        .gallery-item .delete-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(220, 40, 40, 0.85);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
            line-height: 24px;
            padding: 0;
            display: none;
        }
        .gallery-item:hover .delete-btn { display: block; }
        .gallery-item .meta {
            font-size: 11px;
            color: var(--text-meta);
            padding: 4px 2px;
            line-height: 1.3;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
background: var(--lightbox-bg);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .lightbox.active { display: flex; }
        .lightbox { background: var(--lightbox-bg); }
        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 4px;
        }

        .timeline-bar { position: relative; height: 24px; border-radius: 4px; overflow: hidden; flex: 1; background: var(--timeline-bar-bg); }
        .timeline-seg { position: absolute; height: 100%; min-width: 3px; cursor: pointer; opacity: 0.85; transition: opacity 0.15s; }
        .timeline-seg:hover { opacity: 1; }
        .timeline-seg.selected { opacity: 1; outline: 2px solid #333; outline-offset: -2px; }
        .timeline-seg.open { background: #4caf50; }
        .timeline-seg.occupied { background: #f44336; }
        .timeline-seg.not_monitored { background: #9e9e9e; }
        .timeline-legend { display: flex; gap: 15px; font-size: 12px; margin-bottom: 10px; }
        .timeline-legend span { display: flex; align-items: center; gap: 4px; }
        .timeline-legend .dot { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
        .timeline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .timeline-date { font-size: 12px; color: var(--text-secondary); font-weight: 600; min-width: 80px; }
        .timeline-window { font-size: 10px; color: var(--text-muted); min-width: 36px; text-align: right; }
        .timeline-info { font-size: 12px; color: var(--text-secondary); margin-top: 8px; padding: 8px; background: var(--timeline-info-bg); border-radius: 4px; }

        .filter-btn {
            background: var(--filter-bg);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 4px;
            color: var(--text);
        }
        .filter-btn:hover { background: var(--filter-hover); color: var(--text); }
        .filter-btn.active { background: #0078d4; color: #fff; border-color: #0078d4; }

        .page-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 3px;
            color: var(--text);
        }
        .page-btn:hover { background: var(--filter-hover); }
        .page-btn.active { background: #0078d4; color: #fff; border-color: #0078d4; }

        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
            color: var(--text);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
    <h1>Parking Monitor</h1>
    <p id="deployTime" style="color:var(--text-muted); font-size:13px; margin-bottom:5px;"></p>
    <p style="margin-bottom:15px;"><a href="/calibrate" style="color:#0078d4;">Settings</a></p>

    <div class="upload-form">
        <h2>Upload Image</h2>
        <form id="uploadForm">
            <label for="apiKey">API Key</label>
            <input type="text" id="apiKey" value="0bac0b5f-43c6-59f2-9e6e-2c3c60674f3d" style="width:100%; padding:6px; margin-bottom:12px; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:4px;">
            <label for="fileInput" class="file-label" id="fileLabel">Tap to choose image</label>
            <input type="file" id="fileInput" accept="image/jpeg,image/png">
            <button type="submit">Upload</button>
        </form>
        <div id="status" class="status"></div>
        <div id="detectionResult" class="detection-result"></div>
    </div>

    <h2>Timeline (Past 2 Days) <button class="refresh-btn" onclick="loadTimeline()">Refresh</button></h2>
    <div id="timeline" style="background:var(--bg-card); padding:15px; border-radius:8px; box-shadow:0 1px 3px var(--shadow); margin-bottom:20px;"></div>
    <div id="timelineInfo"></div>

    <h2>All Images <button class="refresh-btn" onclick="loadGallery()">Refresh</button></h2>
    <div style="margin-bottom:10px;">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('open', this)">Open spots detected</button>
        <button class="filter-btn" onclick="setFilter('occupied', this)">All spots occupied</button>
        <label style="margin-left:12px; font-size:13px; cursor:pointer;"><input type="checkbox" id="showOriginals" onchange="loadGallery(1)"> Show originals</label>
    </div>
    <div id="gallery" class="gallery"></div>
    <div id="pagination" style="margin-top:15px; text-align:center;"></div>

    <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        (function() {
            const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        })();

        const uploadForm = document.getElementById("uploadForm");
        const statusEl = document.getElementById("status");
        const fileLabel = document.getElementById("fileLabel");

        document.getElementById("fileInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                fileLabel.textContent = file.name;
                fileLabel.classList.add("has-file");
            } else {
                fileLabel.textContent = "Tap to choose image";
                fileLabel.classList.remove("has-file");
            }
        });

        const MAX_DIM = 768;

        function resizeImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width <= MAX_DIM && height <= MAX_DIM) {
                            resolve(file);
                            return;
                        }
                        const scale = Math.min(MAX_DIM / width, MAX_DIM / height);
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
                        const binary = atob(dataUrl.split(",")[1]);
                        const array = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                        resolve(new Blob([array], { type: "image/jpeg" }));
                    };
                    img.onerror = () => resolve(file);
                    img.src = ev.target.result;
                };
                reader.onerror = () => resolve(file);
                reader.readAsDataURL(file);
            });
        }

        uploadForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const file = document.getElementById("fileInput").files[0];
            const apiKey = document.getElementById("apiKey").value;
            if (!file) {
                statusEl.textContent = "Please select a file.";
                statusEl.className = "status err";
                return;
            }

            statusEl.textContent = "Resizing...";
            statusEl.className = "status";
            const resized = await resizeImage(file);

            const formData = new FormData();
            formData.append("file", resized, file.name);
            formData.append("api_key", apiKey);

            try {
                const res = await fetch("/upload", { method: "POST", body: formData });
                if (res.ok) {
                    const data = await res.json();
                    statusEl.textContent = `Uploaded: ${data.filename} (${data.size} bytes)`;
                    statusEl.className = "status ok";
                    showDetection(data.detection);
                    loadGallery();
                } else {
                    statusEl.textContent = `Error: ${res.status} ${res.statusText}`;
                    statusEl.className = "status err";
                }
            } catch (err) {
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.className = "status err";
            }
        });

        let currentPage = 1;
        let currentFilter = "all";

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            loadGallery(1);
        }

        async function loadGallery(page) {
            page = page || currentPage;
            currentPage = page;
            const gallery = document.getElementById("gallery");
            const pagination = document.getElementById("pagination");
            try {
                const showOrig = document.getElementById("showOriginals").checked;
                let url = `/images?page=${page}&filter=${currentFilter}`;
                if (!showOrig) url += `&hide_originals=1`;
                if (timeFrom) url += `&from=${encodeURIComponent(timeFrom)}`;
                if (timeTo) url += `&to=${encodeURIComponent(timeTo)}`;
                const res = await fetch(url);
                const data = await res.json();
                gallery.innerHTML = data.images.map(img => {
                    const isLabeled = img.filename.includes("_labeled");
                    let meta = "";
                    if (isLabeled) {
                        const openCount = (img.open || []).length;
                        const totalCount = openCount + (img.occupied || []).length;
                        meta = `${img.model || ""}  &middot; ${openCount}/${totalCount} open`;
                    } else {
                        meta = img.source || "";
                    }
                    if (img.time) meta += ` &middot; ${img.time}`;
                    return `<div class="gallery-item">
                        <img src="/images/${img.filename}" alt="${img.filename}" onclick="openLightbox('/images/${img.filename}')">
                        <button class="delete-btn" onclick="deleteImage('${img.filename}')">&times;</button>
                        <div class="meta">${meta}</div>
                    </div>`;
                }).join("");

                if (data.pages > 1) {
                    let btns = "";
                    for (let i = 1; i <= data.pages; i++) {
                        btns += `<button class="page-btn${i === page ? ' active' : ''}" onclick="loadGallery(${i})">${i}</button>`;
                    }
                    pagination.innerHTML = `<span style="color:#888; font-size:13px;">${data.total} images</span><br>${btns}`;
                } else {
                    pagination.innerHTML = "";
                }
            } catch {
                gallery.innerHTML = "";
            }
        }

        function showDetection(det) {
            const el = document.getElementById("detectionResult");
            if (!det) { el.className = "detection-result"; return; }
            const spots = Array.from({length: det.total}, (_, i) => i + 1).map(s =>
                det.open.includes(s)
                    ? `<span class="spot-open">#${s} open</span>`
                    : `<span class="spot-occupied">#${s} occupied</span>`
            ).join(" &middot; ");
            el.innerHTML = `<strong>Detection:</strong> ${det.open.length}/${det.total} spots open<br>${spots}`;
            el.className = "detection-result active";
        }

        function openLightbox(src) {
            document.getElementById("lightboxImg").src = src;
            document.getElementById("lightbox").classList.add("active");
        }

        async function deleteImage(name) {
            if (!confirm(`Delete ${name}?`)) return;
            const apiKey = document.getElementById("apiKey").value;
            try {
                const res = await fetch(`/images/${name}`, {
                    method: "DELETE",
                    headers: { "X-API-Key": apiKey }
                });
                if (res.ok) {
                    loadGallery();
                } else {
                    alert(`Delete failed: ${res.status}`);
                }
            } catch (err) {
                alert(`Delete failed: ${err.message}`);
            }
        }

        fetch("/info").then(r => r.json()).then(d => {
            document.getElementById("deployTime").textContent = `Last deployed: ${d.deploy_time}`;
        });

        let allSegments = [];
        let selectedSegKey = null;
        let timeFrom = "";
        let timeTo = "";

        function selectSegment(dayIdx, segIdx) {
            const key = `${dayIdx}-${segIdx}`;
            const infoEl = document.getElementById("timelineInfo");
            if (selectedSegKey === key) {
                selectedSegKey = null;
                timeFrom = "";
                timeTo = "";
                infoEl.innerHTML = "";
            } else {
                selectedSegKey = key;
                const seg = allSegments[dayIdx].segments[segIdx];
                timeFrom = seg.start;
                timeTo = seg.end;
                const statusLabels = { open: "Open spots", occupied: "All occupied", not_monitored: "Not monitored" };
                const startTime = seg.start.substring(11);
                const endTime = seg.end.substring(11);
                const startDate = new Date(seg.start.replace(" ", "T"));
                const endDate = new Date(seg.end.replace(" ", "T"));
                const durationMin = Math.round((endDate - startDate) / 60000);
                const durStr = durationMin >= 60 ? `${Math.floor(durationMin/60)}h ${durationMin%60}m` : `${durationMin}m`;
                infoEl.innerHTML = `<div class="timeline-info"><strong>${statusLabels[seg.status]}</strong> — ${startTime} to ${endTime} — ${seg.count} detections, ${durStr}</div>`;
            }
            document.querySelectorAll(".timeline-seg").forEach(el => {
                el.classList.toggle("selected", el.dataset.key === selectedSegKey);
            });
            loadGallery(1);
        }

        function timeToMinutes(timeStr) {
            const [h, m, s] = timeStr.split(" ")[1].split(":").map(Number);
            return h * 60 + m + s / 60;
        }

        const WINDOWS = [
            { label: "00-06", start: 0,    end: 360  },
            { label: "06-12", start: 360,  end: 720  },
            { label: "12-18", start: 720,  end: 1080 },
            { label: "18-24", start: 1080, end: 1440 },
        ];

        async function loadTimeline() {
            const el = document.getElementById("timeline");
            const infoEl = document.getElementById("timelineInfo");
            try {
                const res = await fetch("/timeline");
                const data = await res.json();
                allSegments = data.days || [];

                if (!allSegments.length) {
                    el.innerHTML = '<span style="color:#888; font-style:italic;">No data yet</span>';
                    return;
                }

                const legend = `<div class="timeline-legend">
                    <span><span class="dot" style="background:#4caf50"></span> Open spots</span>
                    <span><span class="dot" style="background:#f44336"></span> All occupied</span>
                </div>`;

                let rows = "";
                allSegments.forEach((day, dayIdx) => {
                    WINDOWS.forEach((win, winIdx) => {
                        const dateLabel = winIdx === 0 ? day.date : "";
                        let bar = '<div class="timeline-bar">';
                        day.segments.forEach((seg, segIdx) => {
                            const segStart = timeToMinutes(seg.start);
                            const segEnd = Math.max(timeToMinutes(seg.end), segStart + 0.5);
                            if (segStart >= win.end || segEnd <= win.start) return;
                            const clippedStart = Math.max(segStart, win.start);
                            const clippedEnd = Math.min(segEnd, win.end);
                            const leftPct = (clippedStart - win.start) / 360 * 100;
                            const widthPct = Math.max((clippedEnd - clippedStart) / 360 * 100, 0.3);
                            const key = `${dayIdx}-${segIdx}`;
                            const sel = selectedSegKey === key ? " selected" : "";
                            bar += `<div class="timeline-seg ${seg.status}${sel}" data-key="${key}" style="left:${leftPct}%;width:${widthPct}%;" onclick="selectSegment(${dayIdx},${segIdx})"></div>`;
                        });
                        bar += '</div>';
                        rows += `<div class="timeline-row">
                            <span class="timeline-date">${dateLabel}</span>
                            <span class="timeline-window">${win.label}</span>
                            ${bar}
                        </div>`;
                    });
                    rows += '<div style="margin-bottom:6px;"></div>';
                });

                el.innerHTML = legend + rows;
                if (!selectedSegKey) infoEl.innerHTML = "";
            } catch {
                el.innerHTML = '<span style="color:red;">Failed to load timeline</span>';
            }
        }

        loadTimeline();
        loadGallery();
    </script>
</body>
</html>
